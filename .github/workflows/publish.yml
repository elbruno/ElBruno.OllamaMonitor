name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Package version (leave empty to use the project version)
        required: false
        type: string

jobs:
  publish:
    runs-on: windows-latest
    environment: release
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'release') {
            $version = '${{ github.event.release.tag_name }}'
          }
          elseif ('${{ inputs.version }}') {
            $version = '${{ inputs.version }}'
          }
          else {
            [xml]$project = Get-Content 'src\ElBruno.OllamaMonitor.Tool\ElBruno.OllamaMonitor.Tool.csproj'
            $version = $project.Project.PropertyGroup.Version
          }

          $version = $version.TrimStart('v').TrimStart('.')

          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+') {
            throw "Invalid version: $version"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Publishing version $version"

      - name: Restore
        run: dotnet restore ElBruno.OllamaMonitor.sln

      - name: Build
        run: dotnet build ElBruno.OllamaMonitor.sln -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack
        shell: pwsh
        run: .\build\Pack-Tool.ps1 -Configuration Release -Version ${{ steps.version.outputs.version }}

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem -Path .\artifacts\packages\*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key '${{ steps.login.outputs.NUGET_API_KEY }}' --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/packages/*.nupkg
